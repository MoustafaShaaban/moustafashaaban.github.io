site_name: Moustafa Shaaban
site_url: https://moustafashaaban.github.io/
site_description: My personal website
site_author: Moustafa Shaaban

theme:
    name: material
    features:
        - navigation.instant
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs
        - navigation.tabs.sticky
        - navigation.expand
        - toc.follow
        - navigation.top
        - navigation.footer
    

    palette: 

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
nav:
    - Resume: resume.md
    - Projects: 
        - django-projects.md
        - gis-projects.md
    - Tutorials: tutorials/tutorials.md


copyright: Copyright &copy; 2023 Moustafa Shaaban
    
extra:
    social:
        - icon: fontawesome/brands/github
          link: https://github.com/MoustafaShaaban
        - icon: fontawesome/brands/linkedin
          link: https://www.linkedin.com/in/moustafashaaban
        - icon: fontawesome/brands/medium
          link: https://medium.com/@moustafashaaban
        - icon: fontawesome/brands/twitter
          link: https://twitter.com/_MoustafaShaban



# Adding the git revision date plugin
plugins:
    - search
    - git-revision-date-localized:
        type: date
        enable_creation_date: true